plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ds.downloadgate'
    compileSdk 35

    defaultConfig {
        applicationId "com.ds.downloadgate"
        minSdk 31
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            // Signing config diisi via GitHub Secrets di CI
            // signingConfig signingConfigs.release
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

dependencies {
    // LSPosed API — compileOnly agar tidak dibundel ke APK
    compileOnly 'io.github.libxposed:api:1.0.0'
    compileOnly 'io.github.libxposed:service:1.0.0'

    // AndroidX minimal untuk UI
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'com.google.android.material:material:1.12.0'
}
